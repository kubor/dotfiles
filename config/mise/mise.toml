[tools]
# Programming Languages
python = ["3.12.0"]
node = "latest"
go = "latest"
rust = "1.81.0"

# CLI Tools
bat = "latest"
ripgrep = "latest"
github-cli = "latest"
delta = "latest"
starship = "latest"
uv = "latest"

# Development Tools
pre-commit = "latest"
eza = "latest"
fzf = "latest"
zellij = "latest"
actionlint = "latest"
shellcheck = "latest"
hyperfine = "latest"

[settings]
# Automatically install missing tools when entering directories
auto_install = true

# Trust config files in parent directories
trusted_config_paths = ["~"]
idiomatic_version_file_enable_tools = ["node"]
